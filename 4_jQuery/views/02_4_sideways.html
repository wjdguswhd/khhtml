    <title>Document</title>
    <script src="../js/jquery-4.0.0.min.js"></script>
    <style>
        .wrap, .wrap *{border:1px solid lightgray; display: block; padding: 5px; margin: 15px;}
    </style>
</head>
<body>
    <h1>객체 탐색</h1>
    <h2>탐색 메소드</h2>
    <h3>Sideways 메소드</h3>
    <div class="wrap">div (parent)
        <p>p</p>
        <span>span</span>
        <h4>h4</h4>
        <h5>h5</h5>
        <p>p</p>
    </div>
    <script>
        $(()=>{
            $('h4').siblings().css({'color':'red','border':'2px solid red'});
            $('h4').siblings('p').css({'color':'orange','border':'2px solid orange'});

            const h4 = document.getElementsByTagName('h4')[0];

            $('h4').next().css({'color':'blue','border':'2px solid blue'});
            const next = h4.nextElementSibling;
            next.style.fontStyle='italic';

            $('h4').nextAll().css('font-size','30px');
            $('h4').nextUntil('p').css('border','dashed');

            $('h4').prev().css({'background':'red','color':'white'});
            const prev = h4.previousElementSibling;
            prev.style.fontWeight = '900';

            $('h4').prevAll().css({'background':'beige','color':'green'});
            $('h4').prevUntil('p').css('border','double');
        })
    </script>
