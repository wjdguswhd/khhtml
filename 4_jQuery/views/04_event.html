<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../js/jquery-4.0.0.min.js"></script>
    <style>
        .test{
            width: 150px; height: 50px; border: 1px solid black; text-align: center;
            display:table-cell; vertical-align: middle;
        }
        .outer{width: 100px; height: 50px; background: powderblue; padding: 30px;}
        .inner{width: 100%; height: 100%; background: white;}
        .reverse{background:black; color: white;}
    </style>
</head>
<body>
    <h1>이벤트</h1>
    <h2>이벤트 연결 종류</h2>
    <h3>on()와 off()</h3>
    <div id="onOff" class="test">기본 상태</div>
    <script>
        $(()=>{
            $('#onOff').on('click',()=>{
                console.log('click이벤트를 on()으로 연결');
            });

            $('#onOff').on({'mouseenter':(e)=>{
                $(e.target).css('background','beige').text('마우스 올라감');
            },'mouseleave':function(){
                $(this).css('background','powderblue').text('마우스 내려감');
            },'click':e=>{
                $(e.target).off('mouseenter').off('mouseleave').css('background','white').text('기본 상태');
            }});
        })
    </script>

    <h2>이벤트 종류</h2>
    <h3>마우스 이벤트</h3>
    <h4>mouseover/mouseout(), mouseenter/mouseleave()</h4>
    <div class="outer" id="mouseEvent1">
        <div class="inner"></div>
    </div>
    <br/>
    <div class="outer" id="mouseEvent2">
        <div class="inner"></div>
    </div>
    <script>
        $(()=>{
            //자식요소 접근 시에도 이벤트 발생 = 버블링
            $('#mouseEvent1').on('mouseover',function(){
                console.log($(this).attr('id') + ' over!');
            });
            $('#mouseEvent1').mouseout(function(){
                console.log($(this).attr('id') + ' out!');
            });
            
            //자식요소 접근 시에 이벤트 발생x -> 이벤트 건 곳에만 발생
            $('#mouseEvent2').mouseenter(function(){
                console.log($(this).attr('id') + ' enter!');
            });
            $('#mouseEvent2').on('mouseleave',function(){
                console.log($(this).attr('id') + ' leave!');
            });
        });
    </script>

    <h4>hover()</h4>
    <p>mouseenter()와 mouseleave()를 동시에 사용하는 효과</p>
    <div id="hoverEvent" class="test">기본 상태</div>
    <script>
        $(()=>{
            //div에 마우스가 올라가면 div의 배경이 검은색, 글자가 하얀색
            //div에 마우스가 내려가면 div의 배경이 하얀색, 글자가 검은색
            $('#hoverEvent').hover((e)=>{
                // console.log(enter);
                // $(e.target).attr('class','reverse');
                //$(e.target).addClass('reverse');
                $(e.target).toggleClass('reverse');
            },(e)=>{
                // console.log(leave);
                ///(e.target).removeAttr('class');
                //$(e.target).removeClass('reverse');
                $(e.target).toggleClass('reverse');
                //toggleClass() : 선택된 요소에 class가 있으면 삭제하고, 없으면 추가하는 메소드
            });
        });
    </script>

    <h3>키보드 이벤트</h3>
    <h4>keydown(), keypress(), keyup()</h4>
    <textarea cols="40" rows="5" id="keyEvent"></textarea>
    <script>
        $(()=>{
            $('#keyEvent').keydown((e)=>{
                console.log('keydown : ' + e.key);
            })
            $('#keyEvent').keypress((e)=>{
                console.log('keypress : ' + e.key);
            })
            $('#keyEvent').keyup((e)=>{
                console.log('keyup : ' + e.key);
            });
        });
    </script>

    <h4>동적으로 글자 수 세기</h4>
    <span id="counter">0</span>/150<br/>
    <textarea cols="70" rows="5" id="textTest"></textarea>
    <script>
        $(()=>{
            $('#textTest').keyup((e)=>{
                const input = $(e.target).val();
                const inputLength = input.length;

                $('#counter').html(`<b>${inputLength}</b>`);
                if(inputLength > 150){
                    $('#counter').css('color','red');

                    const pieceStr = input.substr(0,150);
                    $(e.target).val(pieceStr);
                }else{
                    $('#counter').css('color','black');
                }
            });
        });
    </script>
</body>
</html>
