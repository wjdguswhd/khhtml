<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>jQuery</h1>
    <p>존 레식에 의해 개발된 경량 JavaScript 라이브러리로 JavaScript코드를 손쉽게 구현하기 위해 개발</p>

    <h2>jQuery 개요</h2>
    <h3>jQuery 장점</h3>
    <ol>
        <li>DOM과 관련된 처리를 쉽게 구현할 수 있음</li>
        <li>Ajax통신, 이벤트 처리 등을 폭넓게 지원</li>
        <li>별도의 플러그인을 통해 차트, 슬라이드쇼, 테이블 등 간단히 구현 가능</li>
    </ol>

    <h3>jQuery 연결</h3>
    <ol id="ol-connect">
        <li>jQuery 홈페이지에서 js파일을 다운로드 받아 연결</li>
        <li>CDN(Content Delivery Network)을 통한 연결</li>
    </ol>
    
</body>
</html>
